<svg width="400" height="250" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8FA464;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7a8f55;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10212B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3344;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background with gradient -->
  <rect width="400" height="250" fill="url(#bgGradient)"/>
  
  <!-- Central Platform/Interface -->
  <rect x="100" y="60" width="200" height="130" rx="10" fill="#EFFBDB" opacity="0.95"/>
  
  <!-- Screen/Header of platform -->
  <rect x="110" y="70" width="180" height="40" rx="5" fill="url(#accentGradient)"/>
  <rect x="120" y="85" width="60" height="4" rx="2" fill="#EFFBDB" opacity="0.8"/>
  <rect x="120" y="93" width="40" height="3" rx="1.5" fill="#EFFBDB" opacity="0.6"/>
  
  <!-- Content lines in platform -->
  <rect x="120" y="120" width="160" height="3" rx="1.5" fill="#10212B" opacity="0.3"/>
  <rect x="120" y="128" width="160" height="3" rx="1.5" fill="#10212B" opacity="0.3"/>
  <rect x="120" y="136" width="120" height="3" rx="1.5" fill="#10212B" opacity="0.3"/>
  
  <!-- Person 1 (Parent- Left) -->
  <g transform="translate(40, 120)">
    <circle cx="0" cy="0" r="22" fill="url(#accentGradient)"/>
    <circle cx="0" cy="-5" r="10" fill="#EFFBDB" opacity="0.9"/>
    <path d="M -12 8 Q -12 18 0 18 Q 12 18 12 8" fill="#EFFBDB" opacity="0.9"/>
  </g>
  
  <!-- Person 2 (Teacher- Right) -->
  <g transform="translate(360, 120)">
    <circle cx="0" cy="0" r="22" fill="url(#accentGradient)"/>
    <circle cx="0" cy="-5" r="10" fill="#EFFBDB" opacity="0.9"/>
    <path d="M -12 8 Q -12 18 0 18 Q 12 18 12 8" fill="#EFFBDB" opacity="0.9"/>
  </g>
  
  <!-- Connection arrows showing engagement -->
  <path d="M 65 120 L 95 120" stroke="#EFFBDB" stroke-width="2.5" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 335 120 L 305 120" stroke="#EFFBDB" stroke-width="2.5" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EFFBDB" opacity="0.8"/>
    </marker>
  </defs>
  
  <!-- Communication bubbles -->
  <g transform="translate(140, 45)">
    <ellipse cx="0" cy="0" rx="18" ry="14" fill="#EFFBDB" opacity="0.9"/>
    <path d="M -10 8 L -5 15 L 0 8" fill="#EFFBDB" opacity="0.9"/>
    <circle cx="-3" cy="-2" r="2" fill="#8FA464" opacity="0.6"/>
    <circle cx="3" cy="-2" r="2" fill="#8FA464" opacity="0.6"/>
  </g>
  
  <g transform="translate(260, 45)">
    <ellipse cx="0" cy="0" rx="18" ry="14" fill="#EFFBDB" opacity="0.9"/>
    <path d="M 10 8 L 15 15 L 20 8" fill="#EFFBDB" opacity="0.9"/>
    <circle cx="-3" cy="-2" r="2" fill="#8FA464" opacity="0.6"/>
    <circle cx="3" cy="-2" r="2" fill="#8FA464" opacity="0.6"/>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="30" r="12" fill="#EFFBDB" opacity="0.2"/>
  <circle cx="370" cy="220" r="18" fill="#EFFBDB" opacity="0.2"/>
  <circle cx="350" cy="40" r="10" fill="#10212B" opacity="0.15"/>
  <circle cx="50" cy="200" r="15" fill="#10212B" opacity="0.15"/>
  
  <!-- Network/connection dots -->
  <circle cx="80" cy="180" r="4" fill="#EFFBDB" opacity="0.5"/>
  <circle cx="320" cy="180" r="4" fill="#EFFBDB" opacity="0.5"/>
  <circle cx="200" cy="210" r="5" fill="#EFFBDB" opacity="0.6"/>
</svg>
