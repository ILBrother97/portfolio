<svg width="400" height="250" viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0C0C0C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A2E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hubGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891B2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DB2777;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0596E6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="beamGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#7C3AED;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0.8" />
    </linearGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="250" fill="url(#bgGradient)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.05">
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="white" stroke-width="0.5"/>
    </pattern>
    <rect width="400" height="250" fill="url(#grid)"/>
  </g>
  
  <!-- Light beams from center -->
  <g opacity="0.3">
    <path d="M 200 125 L 100 0 L 140 0 Z" fill="url(#beamGrad)">
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M 200 125 L 300 0 L 260 0 Z" fill="url(#beamGrad)">
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="3s" repeatCount="indefinite" begin="0.5s"/>
    </path>
    <path d="M 200 125 L 100 250 L 140 250 Z" fill="url(#beamGrad)">
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="3s" repeatCount="indefinite" begin="1s"/>
    </path>
    <path d="M 200 125 L 300 250 L 260 250 Z" fill="url(#beamGrad)">
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="3s" repeatCount="indefinite" begin="1.5s"/>
    </path>
  </g>
  
  <!-- Central AI Hub -->
  <g transform="translate(200, 125)" filter="url(#glow)">
    <!-- Rotating outer ring -->
    <circle cx="0" cy="0" r="55" fill="none" stroke="#7C3AED" stroke-width="1" stroke-dasharray="8,4">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite"/>
    </circle>
    <!-- Inner ring -->
    <circle cx="0" cy="0" r="40" fill="none" stroke="#4F46E5" stroke-width="2"/>
    <!-- Core -->
    <circle cx="0" cy="0" r="25" fill="url(#hubGrad)"/>
    <!-- Brain/neural icon -->
    <g fill="white" opacity="0.9">
      <circle cx="-8" cy="-5" r="3"/>
      <circle cx="0" cy="-8" r="2.5"/>
      <circle cx="8" cy="-5" r="3"/>
      <circle cx="-10" cy="3" r="2"/>
      <circle cx="10" cy="3" r="2"/>
      <circle cx="0" cy="0" r="2.5"/>
      <circle cx="-6" cy="8" r="2"/>
      <circle cx="6" cy="8" r="2"/>
      <!-- Connections -->
      <line x1="-8" y1="-5" x2="0" y2="-8" stroke="white" stroke-width="1" opacity="0.5"/>
      <line x1="0" y1="-8" x2="8" y2="-5" stroke="white" stroke-width="1" opacity="0.5"/>
      <line x1="-8" y1="-5" x2="-10" y2="3" stroke="white" stroke-width="1" opacity="0.5"/>
      <line x1="8" y1="-5" x2="10" y2="3" stroke="white" stroke-width="1" opacity="0.5"/>
      <line x1="-10" y1="3" x2="0" y2="0" stroke="white" stroke-width="1" opacity="0.5"/>
      <line x1="10" y1="3" x2="0" y2="0" stroke="white" stroke-width="1" opacity="0.5"/>
      <line x1="0" y1="0" x2="-6" y2="8" stroke="white" stroke-width="1" opacity="0.5"/>
      <line x1="0" y1="0" x2="6" y2="8" stroke="white" stroke-width="1" opacity="0.5"/>
    </g>
    <!-- Pulse effect -->
    <circle cx="0" cy="0" r="25" fill="none" stroke="white" stroke-width="1" opacity="0.5">
      <animate attributeName="r" values="25;40;25" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- AI Tool Cards - Floating around -->
  
  <!-- ChatGPT Card (Top Left) -->
  <g transform="translate(60, 55)" filter="url(#softGlow)">
    <rect x="0" y="0" width="50" height="55" rx="10" fill="#10A37F"/>
    <circle cx="25" cy="20" r="12" fill="white"/>
    <path d="M 17 24 L 25 31 L 35 17" stroke="#10A37F" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="25" y="45" text-anchor="middle" fill="white" font-family="Arial" font-size="8" font-weight="bold">ChatGPT</text>
    <!-- Floating indicator -->
    <circle cx="50" cy="0" r="4" fill="#10B981">
      <animate attributeName="cy" values="55;50;55" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Midjourney Card (Top Right) -->
  <g transform="translate(290, 55)" filter="url(#softGlow)">
    <rect x="0" y="0" width="50" height="55" rx="10" fill="#8B5CF6"/>
    <circle cx="25" cy="20" r="12" fill="white" opacity="0.3"/>
    <circle cx="25" cy="20" r="6" fill="white"/>
    <text x="25" y="45" text-anchor="middle" fill="white" font-family="Arial" font-size="8" font-weight="bold">Midjourney</text>
    <!-- Sparkle effect -->
    <g fill="white">
      <circle cx="5" cy="5" r="1">
        <animate attributeName="opacity" values="1;0;1" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="45" cy="50" r="1">
        <animate attributeName="opacity" values="1;0;1" dur="1.5s" repeatCount="indefinite" begin="0.3s"/>
      </circle>
    </g>
  </g>
  
  <!-- Claude Card (Bottom Left) -->
  <g transform="translate(60, 160)" filter="url(#softGlow)">
    <rect x="0" y="0" width="50" height="55" rx="10" fill="#D97706"/>
    <circle cx="25" cy="20" r="12" fill="white"/>
    <text x="25" y="26" text-anchor="middle" fill="#D97706" font-family="Arial" font-size="16" font-weight="bold">C</text>
    <text x="25" y="45" text-anchor="middle" fill="white" font-family="Arial" font-size="8" font-weight="bold">Claude</text>
    <!-- Code brackets -->
    <path d="M 8 48 L 3 52 L 8 56" stroke="white" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M 42 48 L 47 52 L 42 56" stroke="white" stroke-width="1.5" fill="none" opacity="0.6"/>
  </g>
  
  <!-- GitHub Copilot Card (Bottom Right) -->
  <g transform="translate(290, 160)" filter="url(#softGlow)">
    <rect x="0" y="0" width="50" height="55" rx="10" fill="#6EE7B7"/>
    <g stroke="#065F46" stroke-width="2" fill="none" stroke-linecap="round">
      <path d="M 12 15 L 18 30 L 25 15"/>
      <path d="M 22 30 L 22 42"/>
      <path d="M 28 18 L 35 25"/>
      <path d="M 32 20 L 38 28"/>
    </g>
    <text x="25" y="48" text-anchor="middle" fill="#065F46" font-family="Arial" font-size="7" font-weight="bold">Copilot</text>
  </g>
  
  <!-- Connection Lines with animation -->
  <g stroke-width="2" fill="none" opacity="0.7">
    <!-- Top connections -->
    <path d="M 110 80 Q 155 100 165 115" stroke="#06B6D4">
      <animate attributeName="stroke-dashoffset" values="0;-20;0" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 290 80 Q 245 100 235 115" stroke="#8B5CF6">
      <animate attributeName="stroke-dashoffset" values="0;-20;0" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    </path>
    <!-- Bottom connections -->
    <path d="M 110 190 Q 155 150 165 135" stroke="#D97706">
      <animate attributeName="stroke-dashoffset" values="0;-20;0" dur="2s" repeatCount="indefinite" begin="0.6s"/>
    </path>
    <path d="M 290 190 Q 245 150 235 135" stroke="#10B981">
      <animate attributeName="stroke-dashoffset" values="0;-20;0" dur="2s" repeatCount="indefinite" begin="0.9s"/>
    </path>
  </g>
  
  <!-- Data packets on connections -->
  <circle cx="135" cy="95" r="3" fill="#06B6D4">
    <animate attributeName="opacity" values="1;0;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="265" cy="95" r="3" fill="#8B5CF6">
    <animate attributeName="opacity" values="1;0;1" dur="1.5s" repeatCount="indefinite" begin="0.2s"/>
  </circle>
  <circle cx="135" cy="170" r="3" fill="#D97706">
    <animate attributeName="opacity" values="1;0;1" dur="1.5s" repeatCount="indefinite" begin="0.4s"/>
  </circle>
  <circle cx="265" cy="170" r="3" fill="#10B981">
    <animate attributeName="opacity" values="1;0;1" dur="1.5s" repeatCount="indefinite" begin="0.6s"/>
  </circle>
  
  <!-- Stats Panel (Right Side) -->
  <g transform="translate(320, 100)">
    <rect x="0" y="0" width="60" height="70" rx="8" fill="#1E293B" opacity="0.8"/>
    <text x="30" y="15" text-anchor="middle" fill="#94A3B8" font-family="Arial" font-size="6">TOOLS</text>
    <text x="30" y="32" text-anchor="middle" fill="#7C3AED" font-family="Arial" font-size="18" font-weight="bold">24+</text>
    <!-- Mini bar chart -->
    <rect x="10" y="40" width="8" height="15" rx="2" fill="#06B6D4" opacity="0.7"/>
    <rect x="22" y="35" width="8" height="20" rx="2" fill="#8B5CF6" opacity="0.7"/>
    <rect x="34" y="30" width="8" height="25" rx="2" fill="#EC4899" opacity="0.7"/>
    <rect x="46" y="38" width="8" height="17" rx="2" fill="#10B981" opacity="0.7"/>
  </g>
  
  <!-- User/Profile (Left Side) -->
  <g transform="translate(20, 125)">
    <circle cx="15" cy="15" r="18" fill="#1E293B" opacity="0.6"/>
    <circle cx="15" cy="10" r="8" fill="#E2E8F0"/>
    <path d="M 5 22 Q 15 30 25 22" fill="#E2E8F0"/>
    <!-- Online indicator -->
    <circle cx="25" cy="8" r="5" fill="#10B981">
      <animate attributeName="r" values="5;6;5" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Search/Discovery -->
  <g transform="translate(360, 180)">
    <circle cx="10" cy="10" r="10" fill="none" stroke="#64748B" stroke-width="2"/>
    <line x1="16" y1="16" x2="22" y2="22" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Floating particles -->
  <g fill="white" opacity="0.4">
    <circle cx="40" cy="40" r="1.5">
      <animate attributeName="cy" values="40;35;40" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="360" cy="40" r="1.5">
      <animate attributeName="cy" values="40;45;40" dur="3s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="40" cy="210" r="1.5">
      <animate attributeName="cy" values="210;205;210" dur="3s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="360" cy="210" r="1.5">
      <animate attributeName="cy" values="210;215;210" dur="3s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
    <circle cx="150" cy="25" r="1">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="25" r="1">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle cx="150" cy="225" r="1">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
    <circle cx="250" cy="225" r="1">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite" begin="0.9s"/>
    </circle>
  </g>
</svg>